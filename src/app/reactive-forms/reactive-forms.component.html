<h4 class="m3 text-center">Reactive Forms - User Information</h4>
<div class="m3 container" >
    <form action="" [formGroup]="reactiveForm" (ngSubmit)="onSubmit()" >
        <div class="mb-3">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" id="firstName" class="form-control" formControlName="firstName" required />
        </div>
        <div class="mb-3">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" id="lastName" class="form-control" formControlName="lastName" />
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" formControlName="email" />
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" formControlName="password" />
        </div>
        <div class="mb-3">
            <label for="check" class="form-label">Check</label>
            <input type="checkbox" id="check" class="form-check-input" formControlName="check" />
        </div>
        <div class="m-2" formGroupName="address">
        <h3 class="m-2">Address</h3>
        <div class="mb-4">
            <label for="city" class="form-label">City</label>
            <input type="text" id="city" class="form-control" formControlName="city" />
        </div>
        <div class="mb-4">
            <label for="street" class="form-label">Street</label>
            <input type="text" id="street" class="form-control" formControlName="street" />
        </div>
        <div class="mb-4">
            <label for="pincode" class="form-label">Pincode</label>
            <input type="text" id="pincode" class="form-control" formControlName="pincode" />
        </div>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="reactiveForm.invalid" >Submit</button>
    </form>
</div>
